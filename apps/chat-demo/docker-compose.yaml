services:
  chat-demo:
    image: ghcr.io/mrgarbonzo/corbitsxsecret-chat-demo:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - TARGET_URL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
