services:
  chat-demo:
    image: ghcr.io/mrgarbonzo/corbitsxsecret-test-chat-demo:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - TARGET_URL=${TARGET_URL:-https://my-test-proxy.garbonzo.api.corbits.dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
